apiVersion: batch/v1
kind: CronJob
metadata:
  name: rsync-nas02
  namespace: offsite-backups
spec:
  suspend: true
  concurrencyPolicy: Forbid
  schedule: "0 3 * * *"
  timeZone: America/Detroit
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: tailscale
          containers:
          - name: rsync
            image: ghcr.io/charlesthomas/alpine-rsync:latest
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - /opt/sync.sh
            resources: {}
            volumeMounts:
              - mountPath: /critical
                name: critical
              - mountPath: /opt
                name: sync-script
              - mountPath: /ssh
                name: ssh
              - mountPath: /time-machine
                name: time-machine
          volumes:
            - name: ssh
              secret:
                secretName: ssh
            - name: sync-script
              configMap:
                name: sync-script
            - name: arborwood
              nfs:
                path: /volume1/arborwood
                server: 192.168.1.21
            - name: critical
              nfs:
                path: /volume1/critical
                server: 192.168.1.21
            - name: media
              nfs:
                path: /volume1/media/sync
                server: 192.168.1.21
            - name: time-machine
              nfs:
                path: /volume1/time-machine
                server: 192.168.1.21
