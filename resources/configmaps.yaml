---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-script
  namespace: offsite-backups
data:
  sync.sh: |-
    mkdir /root/.ssh
    cp /ssh/* /root/.ssh
    chmod -R 600 /root/.ssh
    rsync --archive --compress --delete-after --size-only --verbose /critical/ 192.168.1.5:/mnt/nas02/critical/
    rsync --archive --compress --delete-after --size-only --verbose /media/ 192.168.1.5:/mnt/nas02/media/
    rsync --archive --compress --delete-after --size-only --verbose /time-machine/ 192.168.1.5:/mnt/nas02/time-machine/
    rsync --archive --compress --delete-after --size-only --verbose 192.168.2.5:/mnt/nas02/TMBackup/ /arborwood/
